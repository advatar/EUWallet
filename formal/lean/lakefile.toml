name = "WalletModel"
defaultTargets = ["WalletModel"]

# Tier-2 formal model (plan Section 10). No mathlib dependency: builds offline and fast.
# The library holds the state-machine model and the machine-checked invariant proofs.
# The `traces` executable exports conformance traces as JSON for the Rust core to replay.

[[lean_lib]]
name = "WalletModel"

# Additional Tier-2 models for the other core state machines (plan Section 10):
# payment SCA (dynamic linking), ISO 18013-5 proximity, and OID4VCI issuance.
[[lean_lib]]
name = "PaymentModel"

[[lean_lib]]
name = "ProximityModel"

[[lean_lib]]
name = "IssuanceModel"

[[lean_exe]]
name = "traces"
root = "Traces"

# Conformance oracles for the additional machines: each emits JSON traces the corresponding
# Rust crate replays against its `model` mirror (plan Section 10).
[[lean_exe]]
name = "payment_traces"
root = "PaymentTraces"

[[lean_exe]]
name = "proximity_traces"
root = "ProximityTraces"

[[lean_exe]]
name = "issuance_traces"
root = "IssuanceTraces"
