name: euwallet-ci

# Definition-of-done gates for the EUDI wallet (plan Section 13). Every job here must be
# green before a change merges. Jobs mirror the architecture layers: Rust core, formal
# tiers 1/2/3, the iOS shell, traceability, and supply-chain evidence.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-core:
    name: Rust core (fmt, clippy, test)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Validate CI and evidence gates
        run: python3 -m unittest discover -s tools/evidence/tests -p 'test_*.py'
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Test workspace
        run: cargo test --workspace --locked

  supply-chain:
    name: Supply chain (deny, audit, SBOM)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install supply-chain tools
        run: |
          cargo install cargo-deny --locked
          cargo install cargo-audit --locked
      - name: cargo-deny (licenses, bans, sources)
        run: cargo deny check
      - name: cargo-audit (advisories)
        run: cargo audit
      - name: PID UI-test dependency audit
        working-directory: tools/interop/pid-uitest
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=high
          npm run check
      - name: Generate SBOM (CycloneDX)
        run: tools/evidence/sbom.sh
      - name: Upload SBOM evidence
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sboms
          path: docs/certification-evidence/sbom/*.cdx.json
          if-no-files-found: error

  tier1-fuzz-kani:
    name: Tier 1 (bounded fuzz + Kani)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install nightly (for cargo-fuzz)
        run: rustup toolchain install nightly --profile minimal
      - name: Bounded fuzz of the CBOR codec
        run: |
          cargo install cargo-fuzz --locked
          cd fuzz
          cargo +nightly fuzz run mdoc_cbor -- -max_total_time=60 -runs=200000
      - name: Kani bounded proofs
        uses: model-checking/kani-github-action@f838096619a707b0f6b2118cf435eaccfa33e51f # v1.1
        with:
          kani-version: "0.67.0"
          args: "-p cose"

  tier2-lean-oracle:
    name: Tier 2 (Lean proofs + oracle replay)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install elan/Lean
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Build every Lean model
        working-directory: formal/lean
        run: lake build WalletModel PaymentModel ProximityModel IssuanceModel QesModel W2wModel NavigationModel
      - name: Regenerate every oracle trace
        working-directory: formal/lean
        run: |
          lake exe traces > ../../crates/oid4vp/tests/model_traces.json
          lake exe payment_traces > ../../crates/payment/tests/model_traces.json
          lake exe proximity_traces > ../../crates/iso18013-5/tests/model_traces.json
          lake exe issuance_traces > ../../crates/oid4vci/tests/model_traces.json
          lake exe qes_traces > ../../crates/qes/tests/model_traces.json
          lake exe w2w_traces > ../../crates/w2w/tests/model_traces.json
      - name: Fail if any checked-in trace is stale
        run: |
          git diff --exit-code -- \
            crates/oid4vp/tests/model_traces.json \
            crates/payment/tests/model_traces.json \
            crates/iso18013-5/tests/model_traces.json \
            crates/oid4vci/tests/model_traces.json \
            crates/qes/tests/model_traces.json \
            crates/w2w/tests/model_traces.json
      - name: Replay every trace against the Rust core
        run: |
          cargo test --locked -p oid4vp --test conformance
          cargo test --locked -p payment --test conformance
          cargo test --locked -p iso18013-5 --test conformance
          cargo test --locked -p oid4vci --test conformance
          cargo test --locked -p qes --test conformance
          cargo test --locked -p w2w --test conformance

  tier3-tamarin:
    name: Tier 3 (Tamarin symbolic proofs)
    # Tamarin 1.12 publishes a Maude bottle for Tahoe. Older macOS runners compile Maude 3.5.1
    # from source, which is incompatible with their current Apple Clang standard-library headers.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Install Tamarin
        run: |
          brew tap tamarin-prover/tap
          brew trust --formula tamarin-prover/tap/tamarin-prover
          brew trust --formula tamarin-prover/tap/maude
          brew trust --formula tamarin-prover/tap/libbuddy
          brew install tamarin-prover/tap/tamarin-prover
      - name: Prove every Tamarin model
        run: |
          set -euo pipefail
          for model in formal/tamarin/*.spthy; do
            output=$(tamarin-prover --prove "$model" 2>&1)
            printf '%s\n' "$output"
            verified=$(printf '%s\n' "$output" | awk '/verified/ { count += 1 } END { print count + 0 }')
            falsified=$(printf '%s\n' "$output" | awk '/falsified/ { count += 1 } END { print count + 0 }')
            test "$verified" -gt 0
            test "$falsified" -eq 0
          done

  ios-shell:
    name: iOS shell (swift build + test)
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4
      - name: Verify Swift 6 toolchain
        run: |
          set -euo pipefail
          swift_version=$(swift --version)
          printf '%s\n' "$swift_version"
          printf '%s\n' "$swift_version" | grep -Eq 'Swift version ([6-9]|[1-9][0-9]+)\.'
      - name: Regenerate Rust framework and UniFFI bindings
        run: |
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim
          ./build-rust-xcframework.sh
          git diff --exit-code -- Generated/wallet_core.swift Generated/wallet_coreFFI.h
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Install XcodeGen
        run: command -v xcodegen >/dev/null || brew install xcodegen
      - name: Verify Identity Document Provider capability
        run: |
          xcodegen generate --spec project.yml
          ./verify-identity-document-capability.sh
      - name: Native consumer UI tests
        run: ./run-ui-tests.sh

  android-shell:
    name: Android shell (test, lint, debug + release)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Verify production shell
        run: |
          rustup target add aarch64-linux-android
          cargo install cargo-ndk --version 4.1.2 --locked
          ./build-rust-bridge.sh
          git diff --exit-code -- wallet-shell/src/main/kotlin/uniffi/wallet_core/wallet_core.kt
          ./gradlew --no-daemon clean test lint assembleDebug assembleRelease
          test -f wallet-app/build/outputs/apk/debug/wallet-app-debug.apk

  reference-interop:
    name: EU reference-wallet interoperability probe
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Probe configured reference issuer and verifier
        env:
          REFERENCE_ISSUER: ${{ vars.REFERENCE_ISSUER }}
          REFERENCE_VERIFIER: ${{ vars.REFERENCE_VERIFIER }}
          REFERENCE_INTEROP_OUT: ${{ runner.temp }}/reference-interop
        run: tools/reference-interop/run.sh
      - name: Upload interoperability evidence
        uses: actions/upload-artifact@v4
        with:
          name: reference-wallet-interop-${{ github.run_id }}
          path: ${{ runner.temp }}/reference-interop/report.json
          if-no-files-found: error

  traceability:
    name: HLR traceability import
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Import HLRs and refresh mappings
        run: |
          python3 tools/hlr-import/import_hlr.py \
            tools/hlr-import/high-level-requirements.csv \
            traceability/requirements.csv
          python3 tools/evidence/map_traceability.py
      - name: Fail if the checked-in traceability register is stale
        run: git diff --exit-code -- traceability/requirements.csv

  # FCAF conformance runs against a built wallet; wired once M2 (first E2E flow) lands.
  # fcaf:
  #   name: FCAF functional conformance (pinned v0.0.7)
  #   ...
