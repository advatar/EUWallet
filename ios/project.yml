name: EUWalletDemo
options:
  bundleIdPrefix: eu.advatar.wallet
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  AusweisApp2SDKWrapper:
    url: https://github.com/Governikus/AusweisApp2Wrapper-iOS-SPM
    exactVersion: 2.5.4

settings:
  base:
    # Swift 5 language mode: the shell predates Swift 6 strict-concurrency and the demo harness
    # favours legibility over actor annotations. The core's safety lives in Rust, not here.
    SWIFT_VERSION: "5.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  EUWalletDemo:
    type: application
    platform: iOS
    entitlements:
      path: App/EUWalletDemo.entitlements
      properties:
        com.apple.developer.default-data-protection: NSFileProtectionComplete
        com.apple.developer.identity-document-services.document-provider.mobile-document-types:
          - eu.europa.ec.av.1
          - org.iso.23220.photoid.1
          - org.iso.18013.5.1.mDL
          - eu.europa.ec.eudi.pid.1
        com.apple.developer.nfc.readersession.formats:
          - TAG
    sources:
      - path: App
      # The thin native shell (renderer, effect executor, signer, transports, storage) and the
      # UniFFI-generated bindings compile straight into the app module — one module, no imports.
      - path: Sources/WalletShell
      - path: Generated/wallet_core.swift
    dependencies:
      # The real Rust wallet core, cross-compiled for device + simulator by
      # build-rust-xcframework.sh. Static libs → link, don't embed.
      - framework: WalletCore.xcframework
        embed: false
        link: true
      - package: AusweisApp2SDKWrapper
      # Apple requires the provider authorization UI extension whenever the host declares the
      # Digital Credentials mobile-document entitlement. A target dependency embeds the .appex.
      - target: EUWalletDocumentProvider
    settings:
      base:
        # Pin the bundle wrapper and Mach-O name together. Without this, a manual/cached Xcode
        # PRODUCT_NAME override can stage EUWallet.app while Info.plist still points elsewhere.
        PRODUCT_NAME: EUWallet
        EXECUTABLE_NAME: EUWallet
        PRODUCT_BUNDLE_IDENTIFIER: eu.advatar.wallet
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Info.plist
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: "EU Wallet"
        INFOPLIST_KEY_NSCameraUsageDescription: "Use the camera to scan QR codes when adding an ID or sharing information."
        INFOPLIST_KEY_NFCReaderUsageDescription: "Hold your ID card to your iPhone to add your verified ID."
        DEVELOPMENT_TEAM: L2AF8KFX35
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Standard, exempt encryption only (AES-GCM / ECDH / TLS via the platform + aws-lc). Declaring
        # this lets every TestFlight build distribute immediately instead of stalling on a manual
        # export-compliance question each upload.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        # The xcframework vends the `wallet_coreFFI` clang module via its bundled module.modulemap.
        OTHER_LDFLAGS: "-lc++"
        # AusweisApp 2.5.4's official module map still loads its deprecated compatibility header
        # alongside AusweisApp.h. Suppress only that upstream pragma message; our adapter imports
        # the supported Swift wrapper and never imports AusweisApp2.h directly.
        OTHER_SWIFT_FLAGS: "$(inherited) -Xcc -Wno-#pragma-messages"
    postBuildScripts:
      - name: Verify installable app bundle
        script: '"${SRCROOT}/verify-app-bundle.sh" "${TARGET_BUILD_DIR}/${WRAPPER_NAME}"'
        basedOnDependencyAnalysis: false

  EUWalletDocumentProvider:
    type: extensionkit-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: DocumentProvider
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: eu.advatar.wallet.document-provider
        PRODUCT_NAME: EUWalletDocumentProvider
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: DocumentProvider/Info.plist
        DEVELOPMENT_TEAM: L2AF8KFX35
        CODE_SIGN_STYLE: Automatic
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"

  # Runs the REAL Rust core (aws-lc-rs, compiled for the simulator) end to end, on the simulator.
  # Deterministic proof that the flows work on-device, independent of UI screenshotting.
  EUWalletDemoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/OnSim
      - path: Sources/WalletShell
      - path: Generated/wallet_core.swift
      - path: App/DemoAdapters.swift
    dependencies:
      - framework: WalletCore.xcframework
        embed: false
        link: true
      - package: AusweisApp2SDKWrapper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: eu.advatar.wallet.tests
        GENERATE_INFOPLIST_FILE: YES
        OTHER_LDFLAGS: "-lc++"

  EUWalletDemoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/UI
    dependencies:
      - target: EUWalletDemo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: eu.advatar.wallet.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: EUWalletDemo
